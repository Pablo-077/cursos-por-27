<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>PMX - A New Standard</title>


<style>


*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}



:root{

    --gold:#d4af37;

    --black:#000;

    --dark:#050505;

    --panel:#080808;

    --white:#fff;

}



html,body{

    width:100%;

    height:100%;

    overflow:hidden;

    touch-action:manipulation;

}



body{

    background:#000;

    color:white;

    font-family:Arial, Helvetica, sans-serif;

}



/* =====================
        LOADING PMX
===================== */


.loader{

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    background:#000;

}



.logo-load{

    color:var(--gold);

    font-size:85px;

    font-weight:900;

    letter-spacing:15px;

    animation:logoIn 2s ease;

    text-shadow:
    0 0 25px rgba(212,175,55,.4);

}



.tagline{

    margin-top:15px;

    color:#ddd;

    font-size:13px;

    letter-spacing:8px;

    animation:fade 2s;

}



@keyframes logoIn{

    from{

        opacity:0;

        transform:scale(.8);

    }


    to{

        opacity:1;

        transform:scale(1);

    }

}



@keyframes fade{

    from{

        opacity:0;

    }

    to{

        opacity:1;

    }

}



/* =====================
        HOME
===================== */


.home{

    display:none;

    height:100vh;

}





/* =====================
      TOPO PMX V3
===================== */


.brand-bar{

    width:100%;

    height:125px;

    background:

    radial-gradient(
    circle at center,
    rgba(212,175,55,.12),
    transparent 45%
    ),

    #050505;


    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    position:relative;

    overflow:hidden;

}



/* brilho passando */

.brand-bar::after{

    content:"";

    position:absolute;

    top:0;

    left:-100%;

    width:60%;

    height:100%;


    background:

    linear-gradient(
    90deg,
    transparent,
    rgba(212,175,55,.18),
    transparent
    );


    animation:shine 5s infinite;

}



@keyframes shine{


0%{

    left:-100%;

}


50%{

    left:150%;

}


100%{

    left:150%;

}


}



/* símbolo central */


.brand-bar::before{

    content:"✦";

    position:absolute;

    bottom:-9px;

    color:var(--gold);

    background:#050505;

    padding:0 15px;

    font-size:14px;

}






.logo{

    color:var(--gold);

    font-size:48px;

    font-weight:900;

    letter-spacing:18px;

    line-height:1;

    text-shadow:

    0 0 15px rgba(212,175,55,.45);

}





.brand-subtitle{

    margin-top:12px;

    color:#ddd;

    font-size:11px;

    letter-spacing:8px;

    font-weight:300;

}
/* =====================
       NAVEGAÇÃO
===================== */


.navigation{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:25px;

}





.icon-btn{

    width:40px;

    height:40px;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    transition:.3s;

}



.icon-btn:active{

    transform:translateY(-4px) scale(.95);

}



.icon-btn svg{

    width:100%;

    height:100%;

    stroke:var(--gold);

    fill:none;

    stroke-width:1.8;

    stroke-linecap:round;

    stroke-linejoin:round;

}





/* =====================
       PAINÉIS
===================== */


.panel{

    position:fixed;

    top:0;

    height:100vh;

    width:300px;

    background:var(--panel);

    z-index:20;

    padding:35px 25px;

    transition:.45s cubic-bezier(.4,0,.2,1);

    box-shadow:0 0 50px rgba(0,0,0,.9);

}





.menu-panel{

    left:-320px;

}



.menu-panel.active{

    left:0;

}





.cart-panel{

    right:-320px;

}



.cart-panel.active{

    right:0;

}





.panel h2{

    color:var(--gold);

    text-align:center;

    font-size:22px;

    letter-spacing:5px;

    margin-bottom:25px;

}





.panel-line{

    width:100%;

    height:1px;

    background:var(--gold);

    margin-bottom:30px;

}





/* =====================
       ITENS MENU
===================== */


.menu-item{

    display:flex;

    align-items:center;

    gap:15px;

    padding:16px 5px;

    margin:5px 0;

    cursor:pointer;

    color:white;

    transition:.3s;

}



.menu-item svg{

    width:25px;

    height:25px;

}



.menu-item:active{

    color:var(--gold);

    transform:translateX(8px);

}





/* =====================
       CARRINHO
===================== */


.empty-cart{

    text-align:center;

    margin-top:70px;

}



.cart-icon-box{

    position:relative;

    display:inline-block;

    margin-bottom:25px;

}



.cart-icon-box svg{

    width:80px;

    height:80px;

}



.cart-alert{

    position:absolute;

    top:-15px;

    right:-12px;

    width:28px;

    height:28px;

    border-radius:50%;

    background:var(--gold);

    color:#000;

    display:flex;

    justify-content:center;

    align-items:center;

    font-weight:900;

    font-size:18px;

}



.empty-cart p{

    margin:8px 0;

    color:#ddd;

}




.button{

    margin-top:35px;

    padding:14px 30px;

    background:transparent;

    border:1px solid var(--gold);

    color:var(--gold);

    letter-spacing:2px;

    transition:.3s;

}



.button:active{

    background:var(--gold);

    color:#000;

}





.overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.75);

    z-index:15;

    display:none;

}



.overlay.active{

    display:block;

}





.content{

    height:calc(100vh - 160px);

    display:flex;

    justify-content:center;

    align-items:center;

    color:#555;

}
</style>

</head>


<body>



<!-- LOADING -->


<div class="loader" id="loader">


<div class="logo-load">

PMX

</div>


<div class="tagline">

A NEW STANDARD

</div>


</div>







<!-- HOME -->


<div class="home" id="home">






<!-- TOPO PREMIUM -->


<div class="brand-bar">


<div class="logo">

PMX

</div>



<div class="brand-subtitle">

A NEW STANDARD

</div>



</div>







<!-- NAVEGAÇÃO -->


<div class="navigation">





<!-- MENU -->


<div class="icon-btn" onclick="openMenu()">



<svg viewBox="0 0 24 24">


<line x1="4" y1="7" x2="20" y2="7"/>

<line x1="4" y1="12" x2="20" y2="12"/>

<line x1="4" y1="17" x2="20" y2="17"/>



</svg>



</div>







<!-- CARRINHO -->


<div class="icon-btn" onclick="openCart()">



<svg viewBox="0 0 24 24">


<path d="M3 5h2l2 10h10l3-7H7"/>


<circle cx="9" cy="19" r="1.5"/>


<circle cx="17" cy="19" r="1.5"/>



</svg>



</div>






</div>







<div class="content">

Em breve...

</div>




</div>









<!-- MENU LATERAL -->


<div class="panel menu-panel" id="menuPanel">


<h2>

PMX

</h2>



<div class="panel-line"></div>








<!-- CONTA -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<circle cx="12" cy="8" r="4"/>


<path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>


</svg>



<span>

Minha conta

</span>



</div>







<!-- CARRINHO -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<path d="M3 5h2l2 10h10l3-7H7"/>


<circle cx="9" cy="19" r="1.5"/>


<circle cx="17" cy="19" r="1.5"/>



</svg>



<span>

Carrinho

</span>


</div>








<!-- PRODUTOS -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<path d="M4 7h16v14H4z"/>


<path d="M8 7V4h8v3"/>


</svg>



<span>

Produtos

</span>


</div>






<!-- CURSOS -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<polygon points="5,3 19,12 5,21"/>


</svg>



<span>

Cursos

</span>


</div>







<!-- DESTAQUES -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<path d="M12 2l3 7h7l-5 4 2 8-7-5-7 5 2-8-5-4h7z"/>


</svg>



<span>

Destaques

</span>


</div>
<!-- SOBRE -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<circle cx="12" cy="12" r="10"/>


<line x1="12" y1="10" x2="12" y2="17"/>


<circle cx="12" cy="7" r="1"/>


</svg>



<span>

Sobre nós

</span>


</div>







<!-- CONTATO -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<path d="M4 4h16v12H7l-3 4z"/>


</svg>



<span>

Contato

</span>


</div>



</div>









<!-- CARRINHO LATERAL -->


<div class="panel cart-panel" id="cartPanel">


<h2>

CARRINHO

</h2>


<div class="panel-line"></div>




<div class="empty-cart">





<div class="cart-icon-box">



<svg viewBox="0 0 24 24">


<path d="M3 5h2l2 10h10l3-7H7"/>


<circle cx="9" cy="19" r="1.5"/>


<circle cx="17" cy="19" r="1.5"/>



</svg>




<div class="cart-alert">

!

</div>



</div>





<p>

Nada por aqui ainda.

</p>



<p>

Sua próxima escolha começa agora.

</p>







<button class="button">

EXPLORAR PRODUTOS

</button>





</div>



</div>








<!-- OVERLAY -->


<div class="overlay" id="overlay" onclick="closePanels()"></div>







<script>





// =====================
// LOADING
// =====================


setTimeout(()=>{


document.getElementById("loader").style.display="none";


document.getElementById("home").style.display="block";


},3000);








// ELEMENTOS


const menuPanel = document.getElementById("menuPanel");

const cartPanel = document.getElementById("cartPanel");

const overlay = document.getElementById("overlay");







// ABRIR MENU


function openMenu(){


cartPanel.classList.remove("active");


menuPanel.classList.add("active");


overlay.classList.add("active");


}







// ABRIR CARRINHO


function openCart(){


menuPanel.classList.remove("active");


cartPanel.classList.add("active");


overlay.classList.add("active");


}







// FECHAR


function closePanels(){


menuPanel.classList.remove("active");


cartPanel.classList.remove("active");


overlay.classList.remove("active");


}







// EFEITO NOS ITENS


const items=document.querySelectorAll(".menu-item");



items.forEach(item=>{


item.addEventListener("click",()=>{


items.forEach(i=>{


i.style.color="white";


i.style.transform="translateX(0)";


});



item.style.color="#d4af37";


item.style.transform="translateX(8px)";



});


});





</script>



</body>


</html>
