<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>PMX - A New Standard</title>


<style>


*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}



:root{

    --gold:#d4af37;
    --black:#000;
    --panel:#080808;

}



html,body{

    width:100%;
    height:100%;

    overflow:hidden;

    touch-action:manipulation;

}



body{

    background:#000;

    color:white;

    font-family:Arial, Helvetica, sans-serif;

}






/* =====================
        LOADING
===================== */


.loader{

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    background:#000;

}



.logo-load{

    color:var(--gold);

    font-size:85px;

    font-weight:900;

    letter-spacing:15px;

    animation:logoIn 1.8s ease;

    text-shadow:

    0 0 30px rgba(212,175,55,.6);

}





.tagline{

    margin-top:15px;

    letter-spacing:7px;

    color:#ddd;

    opacity:0;

    animation:tagIn 1.5s forwards;

    animation-delay:.5s;

}





@keyframes logoIn{


from{

opacity:0;

transform:scale(.7);

}


to{

opacity:1;

transform:scale(1);

}


}





@keyframes tagIn{


to{

opacity:1;

}


}










/* =====================
        HOME
===================== */


.home{

    display:none;

    height:100vh;

}










/* =====================
       TOPO PMX
===================== */


.brand-bar{


height:145px;


width:100%;



background:


radial-gradient(

circle at center,

rgba(212,175,55,.18),

transparent 55%

),



linear-gradient(

180deg,

#090909,

#020202

);



display:flex;


flex-direction:column;


justify-content:center;


align-items:center;


position:relative;


overflow:hidden;



}






/* brilho passando */


.brand-bar::after{


content:"";


position:absolute;


top:0;


left:-100%;


width:60%;


height:100%;



background:


linear-gradient(

90deg,

transparent,

rgba(212,175,55,.3),

transparent

);



animation:shine 5s infinite;



}





@keyframes shine{


0%{

left:-100%;

}


50%{

left:130%;

}


100%{

left:130%;

}


}







.logo{


color:var(--gold);


font-size:52px;


font-weight:900;


letter-spacing:22px;



text-shadow:


0 0 25px rgba(212,175,55,.5);



}







.brand-subtitle{


margin-top:12px;


font-size:12px;


letter-spacing:9px;


color:#ddd;



}






.brand-separator{


position:absolute;


bottom:-1px;


width:70%;


height:2px;



background:


linear-gradient(

90deg,

transparent,

var(--gold),

transparent

);



box-shadow:


0 0 15px rgba(212,175,55,.8);



}






.separator-star{


position:absolute;


bottom:-9px;


background:#050505;


color:var(--gold);


padding:0 15px;


font-size:15px;



}
/* =====================
       BARRINHA PMX
===================== */


.navigation{


    width:100%;


    height:80px;



    display:flex;


    justify-content:space-between;


    align-items:center;



    padding:0 28px;



}






.icon-btn{


    width:48px;


    height:48px;



    display:flex;


    align-items:center;


    justify-content:center;



    cursor:pointer;



    position:relative;



    z-index:5;



    transition:.3s;



}






.icon-btn svg{


    width:34px;


    height:34px;



    display:block;



    stroke:#d4af37;



    fill:none;



    stroke-width:2;



    stroke-linecap:round;



    stroke-linejoin:round;



}






.icon-btn:active{


    transform:translateY(-4px) scale(.95);



}









/* =====================
       PAINÉIS
===================== */


.panel{


    position:fixed;



    top:0;



    width:300px;



    height:100vh;



    background:#080808;



    z-index:20;



    padding:35px 25px;



    transition:.4s ease;



    box-shadow:

    0 0 40px rgba(0,0,0,.8);



}






.menu-panel{


    left:-320px;



}






.menu-panel.active{


    left:0;



}








.cart-panel{


    right:-320px;



}






.cart-panel.active{


    right:0;



}








.panel h2{


    color:var(--gold);



    text-align:center;



    letter-spacing:5px;



    margin-bottom:25px;



}








.panel-line{


    width:100%;


    height:1px;



    background:


    linear-gradient(

    90deg,

    transparent,

    var(--gold),

    transparent

    );



    margin-bottom:30px;



}








/* =====================
       OVERLAY
===================== */


.overlay{


    position:fixed;



    inset:0;



    background:rgba(0,0,0,.75);



    z-index:15;



    display:none;



}






.overlay.active{


    display:block;



}








/* =====================
       CONTEÚDO
===================== */


.content{


    height:calc(100vh - 225px);



    display:flex;



    justify-content:center;



    align-items:center;



    color:#555;



}
</style>

</head>


<body>





<!-- LOADING -->


<div class="loader" id="loader">


<div class="logo-load">

PMX

</div>


<div class="tagline">

A NEW STANDARD

</div>


</div>










<!-- HOME -->


<div class="home" id="home">






<!-- TOPO -->


<div class="brand-bar">


<div class="logo">

PMX

</div>



<div class="brand-subtitle">

A NEW STANDARD

</div>




<div class="brand-separator"></div>



<div class="separator-star">

✦

</div>



</div>









<!-- BARRINHA -->


<div class="navigation">






<!-- MENU -->


<div class="icon-btn" onclick="openMenu()">



<svg viewBox="0 0 24 24">


<line x1="3" y1="7" x2="21" y2="7"/>


<line x1="3" y1="12" x2="21" y2="12"/>


<line x1="3" y1="17" x2="21" y2="17"/>


</svg>



</div>








<!-- CARRINHO -->


<div class="icon-btn" onclick="openCart()">



<svg viewBox="0 0 24 24">


<path d="M3 4h2l2.5 11h10l3-8H7"/>


<circle cx="9" cy="19" r="1.5"/>


<circle cx="17" cy="19" r="1.5"/>


</svg>



</div>







</div>








<div class="content">


Em breve...


</div>







</div>













<!-- MENU LATERAL -->


<div class="panel menu-panel" id="menuPanel">



<h2>

PMX

</h2>



<div class="panel-line"></div>







<div class="menu-item">


<svg viewBox="0 0 24 24">


<circle cx="12" cy="8" r="4"/>


<path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>


</svg>



<span>

Minha conta

</span>


</div>







<div class="menu-item">


<svg viewBox="0 0 24 24">


<path d="M3 4h2l2.5 11h10l3-8H7"/>


<circle cx="9" cy="19" r="1.5"/>


<circle cx="17" cy="19" r="1.5"/>


</svg>



<span>

Carrinho

</span>


</div>







<div class="menu-item">


<svg viewBox="0 0 24 24">


<path d="M4 7h16v14H4z"/>


<path d="M8 7V4h8v3"/>


</svg>



<span>

Produtos

</span>


</div>







<div class="menu-item">


<svg viewBox="0 0 24 24">


<polygon points="5,3 19,12 5,21"/>


</svg>



<span>

Cursos

</span>


</div>
<!-- DESTAQUES -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<path d="M12 2l3 7h7l-5.5 4.5L18.5 21 12 16.5 5.5 21 7.5 13.5 2 9h7z"/>


</svg>



<span>

Destaques

</span>


</div>








<!-- SOBRE -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<circle cx="12" cy="12" r="10"/>


<line x1="12" y1="10" x2="12" y2="17"/>


<circle cx="12" cy="7" r="1"/>


</svg>



<span>

Sobre nós

</span>


</div>








<!-- CONTATO -->


<div class="menu-item">


<svg viewBox="0 0 24 24">


<path d="M4 4h16v12H7l-3 4z"/>


</svg>



<span>

Contato

</span>


</div>




</div>









<!-- CARRINHO -->


<div class="panel cart-panel" id="cartPanel">


<h2>

CARRINHO

</h2>



<div class="panel-line"></div>






<div class="empty-cart">






<div class="cart-icon-box">



<svg viewBox="0 0 24 24">


<path d="M3 4h2l2.5 11h10l3-8H7"/>


<circle cx="9" cy="19" r="1.5"/>


<circle cx="17" cy="19" r="1.5"/>


</svg>




<div class="cart-alert">

!

</div>



</div>







<p>

Nada por aqui ainda.

</p>



<p>

Sua próxima escolha começa agora.

</p>








<button class="button">

EXPLORAR PRODUTOS

</button>




</div>



</div>









<div class="overlay" id="overlay" onclick="closePanels()"></div>









<script>


// LOADING


setTimeout(()=>{


document.getElementById("loader").style.display="none";


document.getElementById("home").style.display="block";


},3000);







const menuPanel =
document.getElementById("menuPanel");


const cartPanel =
document.getElementById("cartPanel");


const overlay =
document.getElementById("overlay");







function openMenu(){


cartPanel.classList.remove("active");


menuPanel.classList.add("active");


overlay.classList.add("active");


}








function openCart(){


menuPanel.classList.remove("active");


cartPanel.classList.add("active");


overlay.classList.add("active");


}







function closePanels(){


menuPanel.classList.remove("active");


cartPanel.classList.remove("active");


overlay.classList.remove("active");


}







const items =
document.querySelectorAll(".menu-item");



items.forEach(item=>{


item.addEventListener("click",()=>{


items.forEach(i=>{


i.style.color="white";


i.style.transform="translateX(0)";


});



item.style.color="#d4af37";


item.style.transform="translateX(8px)";


});


});





</script>






</body>

</html>
