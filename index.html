<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>PMX - A new standard</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html,body{

    width:100%;
    height:100%;

    overflow:hidden;

    touch-action:manipulation;

}


body{

    background:#000;

    color:white;

    font-family:Arial, Helvetica, sans-serif;

}



/* =====================
        LOADING
===================== */


.loader{

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

}


.logo-load{

    color:#d4af37;

    font-size:80px;

    font-weight:900;

    letter-spacing:12px;

}


.tagline{

    margin-top:15px;

    letter-spacing:5px;

    color:#ddd;

}





/* =====================
        HOME
===================== */


.home{

    display:none;

    height:100vh;

}





/* =====================
      TOPO PMX
===================== */


.brand-bar{

    width:100%;

    height:90px;

    background:#050505;

    display:flex;

    justify-content:center;

    align-items:center;

    position:relative;

}



/* linha premium */

.brand-bar::after{

    content:"";

    position:absolute;

    bottom:0;

    width:55%;

    height:1px;

    background:#d4af37;

}





/* detalhe central */

.brand-bar::before{

    content:"✦";

    position:absolute;

    bottom:-8px;

    color:#d4af37;

    background:#050505;

    padding:0 10px;

    font-size:12px;

}





.logo{

    color:#d4af37;

    font-size:38px;

    font-weight:900;

    letter-spacing:10px;

}





/* =====================
       NAVEGAÇÃO
===================== */


.navigation{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:22px 25px;

}





/* MENU */

.menu-btn{

    cursor:pointer;

    transition:.3s;

}


.menu-btn:active{

    transform:translateY(-4px);

}



.menu-btn span{

    display:block;

    width:30px;

    height:3px;

    background:#d4af37;

    margin:6px 0;

}





/* CARRINHO */


.cart-btn{

    cursor:pointer;

    transition:.3s;

}


.cart-btn:active{

    transform:translateY(-4px);

}


.cart-btn svg{

    width:34px;

    stroke:#d4af37;

}






/* =====================
       PAINÉIS
===================== */


.panel{

    position:fixed;

    top:0;

    height:100vh;

    width:290px;

    background:#080808;

    z-index:20;

    padding:30px 25px;

    transition:.4s;

}



.menu-panel{

    left:-310px;

}


.menu-panel.active{

    left:0;

}



.cart-panel{

    right:-310px;

}


.cart-panel.active{

    right:0;

}




.panel h2{

    color:#d4af37;

    text-align:center;

    margin-bottom:25px;

}





/* DIVISÃO PREMIUM */

.panel-line{

    width:100%;

    height:1px;

    background:#d4af37;

    margin-bottom:35px;

}





/* OPÇÕES MENU */


.option{

    padding:15px 5px;

    margin:8px 0;

    transition:.3s;

}


.option:active{

    color:#d4af37;

    transform:translateX(8px);

}






/* =====================
        CARRINHO
===================== */


.empty-cart{

    text-align:center;

    margin-top:80px;

}


.empty-icon{

    font-size:55px;

    color:#d4af37;

    margin-bottom:25px;

}




.button{

    margin-top:30px;

    padding:12px 25px;

    border:1px solid #d4af37;

    color:#d4af37;

    background:transparent;

}





.overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.7);

    z-index:15;

    display:none;

}


.overlay.active{

    display:block;

}





.content{

    display:flex;

    justify-content:center;

    align-items:center;

    height:calc(100vh - 160px);

    color:#555;

}





</style>
</head>


<body>



<!-- LOADING -->

<div class="loader" id="loader">

    <div class="logo-load">
        PMX
    </div>

    <div class="tagline">
        A NEW STANDARD
    </div>

</div>






<!-- HOME -->

<div class="home" id="home">





<!-- TOPO PMX -->

<div class="brand-bar">


    <div class="logo">
        PMX
    </div>


</div>






<!-- NAVEGAÇÃO -->

<div class="navigation">





    <!-- MENU -->

    <div class="menu-btn" onclick="openMenu()">

        <span></span>
        <span></span>
        <span></span>

    </div>







    <!-- CARRINHO -->

    <div class="cart-btn" onclick="openCart()">



        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">


            <path d="M3 3h2l2 12h11l3-8H7"/>


            <circle cx="9" cy="20" r="1.5"/>


            <circle cx="17" cy="20" r="1.5"/>


        </svg>



    </div>



</div>







<!-- CONTEÚDO PRINCIPAL -->

<div class="content">


    Em breve...


</div>





</div>








<!-- MENU LATERAL -->


<div class="panel menu-panel" id="menuPanel">



    <h2>PMX</h2>


    <div class="panel-line"></div>




    <div class="option">
        👤 Minha conta
    </div>


    <div class="option">
        🛒 Carrinho
    </div>


    <div class="option">
        Produtos
    </div>


    <div class="option">
        Cursos
    </div>


    <div class="option">
        Destaques
    </div>


    <div class="option">
        Sobre nós
    </div>


    <div class="option">
        Contato
    </div>




</div>









<!-- CARRINHO -->


<div class="panel cart-panel" id="cartPanel">



    <h2>
        🛒 Carrinho
    </h2>



    <div class="panel-line"></div>





    <div class="empty-cart">


        <div class="empty-icon">

            ▢

        </div>



        <p>
            Nada por aqui ainda.
        </p>


        <p>
            Sua próxima escolha começa agora.
        </p>





        <button class="button">

            Explorar produtos

        </button>



    </div>



</div>








<!-- FUNDO -->

<div class="overlay" id="overlay" onclick="closePanels()"></div>
<script>


// =====================
// LOADING 3 SEGUNDOS
// =====================


setTimeout(()=>{


    document.getElementById("loader").style.display="none";


    document.getElementById("home").style.display="block";


},3000);








// =====================
// ELEMENTOS
// =====================


const menuPanel = document.getElementById("menuPanel");

const cartPanel = document.getElementById("cartPanel");

const overlay = document.getElementById("overlay");







// =====================
// MENU
// =====================


function openMenu(){


    cartPanel.classList.remove("active");


    menuPanel.classList.add("active");


    overlay.classList.add("active");


}







// =====================
// CARRINHO
// =====================


function openCart(){


    menuPanel.classList.remove("active");


    cartPanel.classList.add("active");


    overlay.classList.add("active");


}







// =====================
// FECHAR
// =====================


function closePanels(){


    menuPanel.classList.remove("active");


    cartPanel.classList.remove("active");


    overlay.classList.remove("active");


}







// =====================
// SELEÇÃO DAS OPÇÕES
// =====================


const options = document.querySelectorAll(".option");



options.forEach(option=>{


    option.addEventListener("click",()=>{


        options.forEach(item=>{


            item.style.color="white";


            item.style.transform="translateX(0)";


        });



        option.style.color="#d4af37";


        option.style.transform="translateX(8px)";



    });



});





</script>


</body>

</html>
