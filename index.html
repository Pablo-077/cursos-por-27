<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>PMX - A new standard</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html, body{

    width:100%;
    height:100%;

    overflow:hidden;

    touch-action: manipulation;

}


body{

    background:#000;

    color:white;

    font-family:Arial, Helvetica, sans-serif;

}




/* ===== LOADING ===== */


.loader{

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

}


.logo-load{

    color:#d4af37;

    font-size:90px;

    font-weight:900;

    letter-spacing:15px;

    animation:entrada 1.5s ease, brilho 2s infinite alternate;

}


.tagline{

    margin-top:20px;

    letter-spacing:6px;

    color:#fff;

    opacity:0;

    animation:aparecer 1s forwards;

    animation-delay:1s;

}




/* ===== HOME ===== */


.home{

    display:none;

    height:100vh;

}



/* ===== TOPO PMX ===== */


.brand-bar{

    width:100%;

    height:110px;

    background:#050505;

    border-bottom:1px solid #d4af37;

    display:flex;

    justify-content:center;

    align-items:center;

    box-shadow:0 5px 20px rgba(212,175,55,.15);

}



.logo{

    color:#d4af37;

    font-size:45px;

    font-weight:900;

    letter-spacing:10px;

}





/* ===== AÇÕES ===== */


.navigation{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:25px;

}



/* MENU */


.menu-btn{

    width:35px;

    cursor:pointer;

}



.menu-btn span{

    display:block;

    width:30px;

    height:3px;

    background:#d4af37;

    margin:7px 0;

    transition:.3s;

}




/* CARRINHO */


.cart-btn{

    cursor:pointer;

}


.cart-btn svg{

    width:35px;

    stroke:#d4af37;

    transition:.3s;

}


.cart-btn:hover svg{

    transform:translateY(-5px);

}




/* ===== PAINÉIS ===== */


.panel{

    position:fixed;

    top:0;

    width:280px;

    height:100vh;

    background:#080808;

    z-index:20;

    padding:35px 25px;

    transition:.4s;

}



.menu-panel{

    left:-300px;

}


.menu-panel.active{

    left:0;

}



.cart-panel{

    right:-300px;

}


.cart-panel.active{

    right:0;

}



.panel h2{

    color:#d4af37;

    margin-bottom:40px;

}



.panel p{

    margin:25px 0;

    font-size:18px;

}





/* CARRINHO VAZIO */


.empty-cart{

    text-align:center;

    margin-top:100px;

    color:#ccc;

}


.empty-cart span{

    font-size:50px;

}



.button{

    margin-top:30px;

    padding:12px 20px;

    border:1px solid #d4af37;

    color:#d4af37;

    background:transparent;

    cursor:pointer;

}





/* FUNDO */


.overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.7);

    display:none;

    z-index:15;

}


.overlay.active{

    display:block;

}





/* CONTEÚDO */


.content{

    display:flex;

    justify-content:center;

    align-items:center;

    height:calc(100vh - 170px);

    color:#777;

}





/* ANIMAÇÕES */


@keyframes entrada{

from{

opacity:0;

transform:scale(.5);

}

to{

opacity:1;

transform:scale(1);

}

}



@keyframes brilho{

from{

text-shadow:0 0 10px #d4af37;

}

to{

text-shadow:0 0 35px #d4af37;

}

}



@keyframes aparecer{

to{

opacity:1;

}

}


</style>
</head>


<body>


<!-- TELA DE CARREGAMENTO -->

<div class="loader" id="loader">

    <div class="logo-load">
        PMX
    </div>

    <div class="tagline">
        A new standard
    </div>

</div>





<!-- HOME -->

<div class="home" id="home">



<!-- TOPO DA MARCA -->

<div class="brand-bar">

    <div class="logo">
        PMX
    </div>

</div>





<!-- NAVEGAÇÃO -->

<div class="navigation">


    <!-- MENU -->

    <div class="menu-btn" onclick="openMenu()">

        <span></span>
        <span></span>
        <span></span>

    </div>





    <!-- CARRINHO -->

    <div class="cart-btn" onclick="openCart()">


        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">

            <path d="M3 3h2l2.5 12h10l2-8H7"/>

            <circle cx="10" cy="20" r="1.5"/>

            <circle cx="17" cy="20" r="1.5"/>

        </svg>


    </div>



</div>







<!-- CONTEÚDO -->

<div class="content">

    Área principal da PMX

</div>






</div>







<!-- MENU LATERAL -->


<div class="panel menu-panel" id="menuPanel">


    <h2>PMX</h2>


    <p>👤 Minha conta</p>

    <p>🛒 Meu carrinho</p>

    <p>Produtos</p>

    <p>Cursos</p>

    <p>Destaques</p>

    <p>Sobre nós</p>

    <p>Contato</p>


</div>







<!-- CARRINHO -->


<div class="panel cart-panel" id="cartPanel">


    <h2>🛒 Carrinho</h2>



    <div class="empty-cart">


        <span>◯</span>


        <p>
        Nada por aqui ainda.
        </p>


        <p>
        Sua próxima escolha começa agora.
        </p>



        <button class="button">

            Explorar produtos

        </button>



    </div>



</div>







<!-- FUNDO PARA FECHAR -->

<div class="overlay" id="overlay" onclick="closePanels()"></div>
<script>


// ENTRADA NA HOME APÓS 3 SEGUNDOS

setTimeout(()=>{


    document.getElementById("loader").style.display="none";


    document.getElementById("home").style.display="block";


},3000);







// ELEMENTOS

const menuPanel = document.getElementById("menuPanel");

const cartPanel = document.getElementById("cartPanel");

const overlay = document.getElementById("overlay");







// ABRIR MENU


function openMenu(){


    menuPanel.classList.add("active");


    overlay.classList.add("active");


}








// ABRIR CARRINHO


function openCart(){


    cartPanel.classList.add("active");


    overlay.classList.add("active");


}








// FECHAR TUDO


function closePanels(){


    menuPanel.classList.remove("active");


    cartPanel.classList.remove("active");


    overlay.classList.remove("active");


}







</script>


</body>

</html>
