<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PMX - A new standard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}


/* ===== LOADING ===== */

.loader{

    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    animation:fadeOut 1s forwards;
    animation-delay:3s;

}


.logo-load{

    color:#d4af37;
    font-size:90px;
    font-weight:900;
    letter-spacing:15px;

    animation:
    entrance 1.5s ease,
    glow 2s infinite alternate;

}


.tagline{

    margin-top:20px;
    letter-spacing:6px;
    opacity:0;

    animation:show 1s forwards;
    animation-delay:1s;

}



/* ===== HOME ===== */

.home{

    display:none;
    height:100vh;

}



/* ===== HEADER ===== */

header{

    height:90px;
    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;

}


.logo{

    color:#d4af37;
    font-size:42px;
    font-weight:900;
    letter-spacing:8px;

}



/* MENU */

.menu-btn{

    position:absolute;
    left:25px;
    top:115px;

    width:35px;
    height:30px;

    cursor:pointer;

    z-index:10;

}


.menu-btn span{

    display:block;

    height:3px;
    width:30px;

    background:#d4af37;

    margin:6px 0;

    transition:.3s;

}


.menu-btn.active span:nth-child(1){

    transform:translateY(9px) rotate(45deg);

}


.menu-btn.active span:nth-child(2){

    opacity:0;

}


.menu-btn.active span:nth-child(3){

    transform:translateY(-9px) rotate(-45deg);

}




/* LADO DIREITO */

.actions{

    position:absolute;

    right:25px;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:25px;

    top:25px;

}



.icon{

    cursor:pointer;

    transition:.3s;

}


.icon:hover{

    transform:translateY(-5px);

}



/* PERFIL */

.profile{

    width:38px;
    height:38px;

    border-radius:50%;

    border:2px solid #d4af37;

    display:flex;

    justify-content:center;
    align-items:center;

}


.profile svg{

    width:22px;
    fill:#d4af37;

}




/* CARRINHO */

.cart svg{

    width:32px;
    stroke:#d4af37;

}




/* CONTEÚDO */

.content{

    height:calc(100vh - 90px);

    display:flex;

    justify-content:center;

    align-items:center;

    color:#777;

}





/* ===== MENU LATERAL ===== */

.sidebar{

    position:fixed;

    top:0;
    left:-300px;

    width:280px;

    height:100vh;

    background:#080808;

    padding:40px 25px;

    transition:.4s;

    z-index:20;

}



.sidebar.active{

    left:0;

}



.sidebar h2{

    color:#d4af37;

    margin-bottom:50px;

}



.sidebar p{

    font-size:18px;

    margin:30px 0;

    transition:.3s;

}



.sidebar p:hover{

    color:#d4af37;

    transform:translateX(8px);

}





/* FUNDO AO ABRIR */

.overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.7);

    display:none;

    z-index:15;

}


.overlay.active{

    display:block;

}





/* ANIMAÇÕES */

@keyframes entrance{

from{
opacity:0;
transform:scale(.5);
}

to{
opacity:1;
transform:scale(1);
}

}



@keyframes glow{

from{
text-shadow:0 0 10px #d4af37;
}

to{
text-shadow:0 0 40px #d4af37;
}

}



@keyframes show{

to{
opacity:1;
}

}



@keyframes fadeOut{

to{
opacity:0;
visibility:hidden;
}

}


</style>
<body>


<!-- TELA DE CARREGAMENTO -->

<div class="loader" id="loader">

    <div class="logo-load">
        PMX
    </div>

    <div class="tagline">
        A new standard
    </div>

</div>



<!-- HOME -->

<div class="home" id="home">


<header>

    <div class="logo">
        PMX
    </div>


</header>



<!-- BOTÃO MENU -->

<div class="menu-btn" id="menuBtn" onclick="toggleMenu()">

    <span></span>
    <span></span>
    <span></span>

</div>




<!-- AÇÕES -->

<div class="actions">


    <!-- PERFIL -->

    <div class="icon profile">

        <svg viewBox="0 0 24 24">

            <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/>

        </svg>

    </div>



    <!-- CARRINHO -->

    <div class="icon cart">

        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">

            <path d="M3 3h2l2.5 12h10l2-8H7"/>

            <circle cx="10" cy="20" r="1.5"/>

            <circle cx="17" cy="20" r="1.5"/>

        </svg>

    </div>


</div>





<!-- CONTEÚDO -->

<div class="content">

    Área principal da PMX

</div>




</div>






<!-- MENU LATERAL -->

<div class="sidebar" id="sidebar">

    <h2>PMX</h2>


    <p>Produtos</p>

    <p>Cursos</p>

    <p>Destaques</p>

    <p>Sobre nós</p>

    <p>Contato</p>


</div>




<!-- FUNDO -->

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>





<script>


// entra na Home depois de 3 segundos

setTimeout(()=>{

    document.getElementById("loader").style.display="none";

    document.getElementById("home").style.display="block";


},3000);






// abre e fecha menu

function toggleMenu(){


    document
    .getElementById("sidebar")
    .classList.toggle("active");



    document
    .getElementById("overlay")
    .classList.toggle("active");



    document
    .getElementById("menuBtn")
    .classList.toggle("active");


}



</script>


</body>

</html>
