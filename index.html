<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PMX - A new standard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

.loader {
    text-align: center;
    animation: sair 1s ease forwards;
    animation-delay: 3s;
}

.logo {
    font-size: 80px;
    font-weight: bold;
    color: #d4af37;
    letter-spacing: 10px;
    animation: brilho 2s infinite alternate;
}

.frase {
    color: #fff;
    margin-top: 15px;
    font-size: 18px;
    letter-spacing: 5px;
    opacity: 0;
    animation: aparecer 2s forwards;
    animation-delay: 1s;
}

@keyframes brilho {
    from {
        text-shadow: 0 0 10px #d4af37;
    }
    to {
        text-shadow: 0 0 40px #d4af37;
    }
}

@keyframes aparecer {
    to {
        opacity: 1;
    }
}

@keyframes sair {
    to {
        opacity: 0;
        transform: scale(1.2);
    }
}
</style>

</head>

<body>

<div class="loader">
    <div class="logo">PMX</div>
    <div class="frase">A new standard</div>
</div>

</body>
</html>
