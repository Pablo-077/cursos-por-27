<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PMX - A new standard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    overflow:hidden;
}


.loader{
    text-align:center;
    animation: sair 1s ease forwards;
    animation-delay:3s;
}


.logo svg{
    width:180px;
    height:180px;
    animation:
    aparecer 1.5s ease,
    brilho 2s infinite alternate;
}


.frase{
    color:#fff;
    margin-top:20px;
    font-size:18px;
    letter-spacing:6px;
    opacity:0;
    animation:frase 1.5s forwards;
    animation-delay:1s;
}


@keyframes aparecer{
    from{
        opacity:0;
        transform:scale(.5);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}


@keyframes brilho{
    from{
        filter:drop-shadow(0 0 5px #d4af37);
    }
    to{
        filter:drop-shadow(0 0 30px #d4af37);
    }
}


@keyframes frase{
    to{
        opacity:1;
    }
}


@keyframes sair{
    to{
        opacity:0;
        transform:scale(1.2);
    }
}

</style>

</head>

<body>

<div class="loader">

<div class="logo">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="100" r="90"
fill="none"
stroke="#d4af37"
stroke-width="4"/>

<text x="100" y="125"
text-anchor="middle"
font-size="80"
font-weight="bold"
font-family="Arial"
fill="#d4af37">
PMX
</text>

</svg>

</div>


<div class="frase">
A new standard
</div>


</div>

</body>
</html>
