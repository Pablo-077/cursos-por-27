<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PMX - A new standard</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
}


/* Tela de carregamento */

.loader {
    text-align: center;
    animation: desaparecer 1s ease forwards;
    animation-delay: 3s;
}


/* Logo PMX */

.logo {
    font-size: 90px;
    font-weight: 900;
    color: #d4af37;
    letter-spacing: 15px;

    animation: entrada 1.5s ease,
               brilho 2s infinite alternate;
}


/* Frase */

.frase {
    margin-top: 20px;
    color: white;
    font-size: 18px;
    letter-spacing: 6px;
    opacity: 0;

    animation: aparecer 2s forwards;
    animation-delay: 1s;
}


/* Animações */

@keyframes entrada {

    from {
        opacity: 0;
        transform: scale(0.5);
    }

    to {
        opacity: 1;
        transform: scale(1);
    }

}


@keyframes brilho {

    from {
        text-shadow: 
        0 0 10px #d4af37;
    }

    to {
        text-shadow:
        0 0 50px #d4af37;
    }

}


@keyframes aparecer {

    to {
        opacity: 1;
    }

}


@keyframes desaparecer {

    to {
        opacity: 0;
        transform: scale(1.2);
    }

}

</style>

</head>


<body>


<div class="loader">

    <div class="logo">
        PMX
    </div>

    <div class="frase">
        A new standard
    </div>

</div>


</body>

</html>
